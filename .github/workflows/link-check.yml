name: Link Check

# Weekly dead-link sweep of the live site. A red run means something a visitor
# can click is broken, including race-page CTAs sampled from the live sitemap.
# Exit codes: 1 = dead links (broken for visitors); 2 = inconclusive (the
# scan tripped SiteGround's WAF bot-challenge and could not verify) — both
# are red, but 2 usually just needs a re-run, not a fix.

on:
  schedule:
    - cron: "0 12 * * 3"   # Wednesdays 12:00 UTC
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check live links (xcskilabs.com)
        run: |
          status=0
          python3 scripts/check_links.py --max-urls 300 --delay 0.4 || status=$?
          # Exit 2 = inconclusive: the WAF challenged this datacenter runner,
          # so nothing was proven dead OR alive. Warn-and-pass — a red here
          # would fire most weeks from runner IPs alone. The nightly immune
          # scan from a residential IP is the authoritative challenge monitor.
          if [ "$status" = "2" ]; then
            echo "::warning::Link check INCONCLUSIVE — SiteGround WAF challenged the runner; dead-link status unverified this run"
            exit 0
          fi
          exit "$status"
