<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XC Ski Labs — Race Search</title>
<meta name="description" content="Search every scored cross-country ski race — classic and skate, worldwide.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sometype+Mono:wght@400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* XC Ski Labs design tokens: Wax Bench */
:root {
  --gl-paper: #f2f0eb;
  --gl-carbon: #141414;
  --gl-swix-red: #d3222a;
  --gl-red-deep: #a8161d;
  --gl-klister: #ffd200;
  --gl-wax-green: #0a7d4f;
  --gl-wax-blue: #1266b3;
  --gl-wax-violet: #7a3f9d;
  --gl-white: #ffffff;
  --gl-hairline: #d8d4c8;
  --gl-muted: #8b877c;
  --gl-measure: 960px;
  --gl-space-2: 8px;
  --gl-space-3: 12px;
  --gl-space-4: 16px;
  --gl-space-5: 24px;
  --gl-space-6: 32px;
  --gl-space-7: 48px;
  --gl-font-display: "Helvetica Neue", Arial, sans-serif;
  --gl-font-data: "Sometype Mono", ui-monospace, Menlo, monospace;
  --gl-font-editorial: "Source Serif 4", Georgia, serif;
  --gl-font-ui: Inter, system-ui, sans-serif;
}

* { box-sizing: border-box; }
body { margin: 0; background: var(--gl-paper); color: var(--gl-carbon); font-family: var(--gl-font-editorial); line-height: 1.55; }
a { color: inherit; }
.wrap { max-width: var(--gl-measure); margin: 0 auto; padding: 0 var(--gl-space-5); }
.gl-nav { position: sticky; top: 0; z-index: 1000; background: var(--gl-carbon); color: var(--gl-white); }
.gl-nav-inner { min-height: 56px; display: flex; align-items: center; justify-content: space-between; gap: var(--gl-space-5); }
.gl-nav-logo { font-family: var(--gl-font-display); font-weight: 900; font-style: italic; text-transform: uppercase; text-decoration: none; letter-spacing: 0; }
.gl-nav-logo em { color: var(--gl-swix-red); font-style: italic; }
.gl-nav-links { display: flex; align-items: center; gap: var(--gl-space-2); list-style: none; margin: 0; padding: 0; }
.gl-nav-links a { min-height: 44px; display: flex; align-items: center; padding: 0 var(--gl-space-4); font-family: var(--gl-font-data); font-size: .68rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; text-decoration: none; color: var(--gl-white); }
.gl-nav-links a.active, .gl-nav-links a:hover { color: var(--gl-klister); }

.hero { background: var(--gl-carbon); color: var(--gl-white); border-bottom: 4px solid var(--gl-swix-red); }
.hero .wrap { padding-top: var(--gl-space-7); padding-bottom: var(--gl-space-6); }
.kick { margin: 0 0 var(--gl-space-3); color: var(--gl-klister); font-family: var(--gl-font-data); font-size: .7rem; font-weight: 700; letter-spacing: .28em; text-transform: uppercase; }
h1 { margin: 0; font-family: var(--gl-font-display); font-size: clamp(2.6rem, 7vw, 4.6rem); font-weight: 900; font-style: italic; line-height: .94; letter-spacing: 0; text-transform: uppercase; }
.stats-bar { display: flex; flex-wrap: wrap; gap: var(--gl-space-5); margin-top: var(--gl-space-5); color: var(--gl-klister); font-family: var(--gl-font-data); font-size: .68rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }

.controls { display: grid; grid-template-columns: minmax(220px, 1fr) repeat(2, minmax(150px, auto)); gap: var(--gl-space-3); align-items: center; padding: var(--gl-space-5) 0 var(--gl-space-3); }
.filter-row { display: flex; flex-wrap: wrap; gap: var(--gl-space-2); grid-column: 1 / -1; }
.search-box, .filter-select { min-height: 44px; border: 2px solid var(--gl-carbon); background: var(--gl-white); color: var(--gl-carbon); padding: 0 var(--gl-space-4); font-family: var(--gl-font-data); font-size: .78rem; }
.search-box:focus, .filter-select:focus { outline: 3px solid var(--gl-klister); outline-offset: 2px; }
.filter-btn { min-height: 44px; border: 2px solid var(--gl-carbon); background: var(--gl-white); color: var(--gl-carbon); padding: 0 var(--gl-space-4); cursor: pointer; font-family: var(--gl-font-data); font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
.filter-btn.active, .filter-btn:hover { background: var(--gl-carbon); color: var(--gl-white); }
.results-info { padding: var(--gl-space-3) 0; color: var(--gl-muted); font-family: var(--gl-font-data); font-size: .7rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }

.race-table { width: 100%; border-collapse: collapse; margin-bottom: var(--gl-space-7); }
.race-table th { padding: 8px 10px; border-bottom: 3px solid var(--gl-carbon); color: var(--gl-muted); font-family: var(--gl-font-data); font-size: .62rem; font-weight: 700; letter-spacing: .2em; text-align: left; text-transform: uppercase; }
.race-table td { padding: 13px 10px; border-bottom: 1px solid var(--gl-hairline); font-size: .98rem; vertical-align: top; }
.r { text-align: right; }
.mono { font-family: var(--gl-font-data); font-size: .78rem; font-weight: 700; }
.tier-badge { display: inline-block; min-width: 34px; margin-right: 8px; background: var(--gl-carbon); color: var(--gl-white); padding: 3px 8px; font-family: var(--gl-font-data); font-size: .56rem; font-weight: 700; letter-spacing: .1em; text-align: center; }
.tier-badge.t1 { background: var(--gl-carbon); color: var(--gl-white); }
.tier-badge.t2, .tier-badge.t3, .tier-badge.t4 { background: var(--gl-white); color: var(--gl-carbon); border: 2px solid var(--gl-carbon); }
.score-display.t1 { color: var(--gl-swix-red); }
.race-name { font-weight: 700; }
.rowlink { color: var(--gl-swix-red); font-family: var(--gl-font-data); font-size: .64rem; font-weight: 700; letter-spacing: .14em; text-decoration: none; white-space: nowrap; }
.empty-state { padding: var(--gl-space-7) 0; color: var(--gl-muted); font-family: var(--gl-font-data); letter-spacing: .12em; text-transform: uppercase; }

.gl-footer { background: var(--gl-swix-red); color: var(--gl-white); }
.gl-footer-inner { min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: var(--gl-space-5); }
.gl-footer-logo { font-family: var(--gl-font-display); font-weight: 900; font-style: italic; text-transform: uppercase; }
.gl-footer-logo em { color: var(--gl-klister); font-style: italic; }
.gl-footer-motto { color: var(--gl-klister); font-family: var(--gl-font-data); font-size: .64rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }

@media (max-width: 720px) {
  .gl-nav-inner, .gl-footer-inner { align-items: flex-start; flex-direction: column; padding: var(--gl-space-3) 0; }
  .gl-nav-links { flex-wrap: wrap; }
  .controls { grid-template-columns: 1fr; }
  .race-table th:nth-child(3), .race-table td:nth-child(3), .race-table th:nth-child(4), .race-table td:nth-child(4) { display: none; }
}
</style>
</head>
<body>
<nav class="gl-nav">
  <div class="wrap gl-nav-inner">
    <a href="/" class="gl-nav-logo" aria-label="XC SKI LABS">XC SKI <em>LABS</em></a>
    <div class="gl-nav-links">
      <a href="/search/" class="active">Races</a>
      <a href="/training-plans/">Plans</a>
      <a href="/coaching/apply/">Coaching</a>
      <a href="/about/">About</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <p class="kick">Race database</p>
    <h1>Search the races</h1>
    <div class="stats-bar">
      <span id="stat-races">— races</span>
      <span id="stat-countries">— countries</span>
      <span id="stat-tiers">T1: — | T2: — | T3: — | T4: —</span>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="controls">
    <input type="text" class="search-box" id="searchInput" placeholder="Search races, countries, regions...">
    <select class="filter-select" id="countryFilter">
      <option value="">All countries</option>
    </select>
    <select class="filter-select" id="sortSelect">
      <option value="score">Sort: score</option>
      <option value="name">Sort: name</option>
      <option value="distance">Sort: distance</option>
      <option value="founded">Sort: founded</option>
      <option value="country">Sort: country</option>
    </select>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="t1">Tier 1</button>
      <button class="filter-btn" data-filter="t2">Tier 2</button>
      <button class="filter-btn" data-filter="t3">Tier 3</button>
      <button class="filter-btn" data-filter="t4">Tier 4</button>
      <button class="filter-btn" data-filter="classic">Classic</button>
      <button class="filter-btn" data-filter="skate">Skate</button>
      <button class="filter-btn" data-filter="both">Both</button>
    </div>
  </div>

  <div class="results-info" id="resultsInfo"></div>
  <table class="race-table">
    <thead><tr><th>Race</th><th>Country</th><th class="r">Distance</th><th>Style</th><th class="r">Score</th><th></th></tr></thead>
    <tbody id="raceGrid"></tbody>
  </table>
</main>

<footer class="gl-footer">
  <div class="wrap gl-footer-inner">
    <span class="gl-footer-logo">XC SKI <em>LABS</em></span>
    <span class="gl-footer-motto">BUILT FOR SKIERS WHO CHASE START LINES</span>
  </div>
</footer>

<script src="nordic-lab-search.js"></script>
</body>
</html>
